name: Deploy

# Deterministic Vercel CLI deploy — bypasses Vercel Git integration brittleness
# that has caused recurring DEPLOYMENT_NOT_FOUND 404s on academy.novex.finance.
# Push triggers an immediate deploy; cron is a safety net that re-promotes the
# latest commit every 6h so an aged-out alias self-heals within 6h max.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '*.md'
      - '.vercel-redeploy-trigger'
  workflow_dispatch:
  schedule:
    # Every 6 hours — alias self-heals within 6h if Vercel ever loses a deployment
    - cron: '0 */6 * * *'

# Prevent overlapping deploys (a push during a cron run would otherwise race)
concurrency:
  group: academy-deploy
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel production env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (prebuilt, in CI — deterministic Node/pnpm versions, no Vercel runner OOM)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Log result
        run: echo "Academy deployed at $(date -u)"
